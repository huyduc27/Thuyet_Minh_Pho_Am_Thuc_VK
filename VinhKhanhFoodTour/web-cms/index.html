<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vĩnh Khánh CMS — Đăng nhập</title>
    <meta name="description" content="Hệ thống quản lý nội dung Phố Ẩm Thực Vĩnh Khánh">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍜</text></svg>">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">🍜</div>
            <h1>Vĩnh Khánh CMS</h1>
            <p class="subtitle">Đăng nhập để quản trị nội dung</p>

            <div id="errorMsg" class="error-msg"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label>EMAIL</label>
                    <input type="email" id="email" placeholder="admin@email.com" required>
                </div>
                <div class="form-group">
                    <label>MẬT KHẨU</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" id="loginBtn">
                    Đăng nhập
                </button>
            </form>

            <div class="login-footer">
                Tài khoản được tạo qua<br>
                <a href="https://console.firebase.google.com" target="_blank">Firebase Console → Authentication</a>
            </div>
        </div>
    </div>

    <!-- Firebase SDK (compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
