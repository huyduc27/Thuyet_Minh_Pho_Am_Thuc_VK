<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vĩnh Khánh CMS — Đăng nhập</title>
    <meta name="description" content="Hệ thống quản lý nội dung Phố Ẩm Thực Vĩnh Khánh">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍜</text></svg>">
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">🍜</div>
            <h1>Vĩnh Khánh CMS</h1>
            <p class="subtitle">Đăng nhập để quản trị nội dung</p>

            <div id="errorMsg" class="error-msg"></div>

            <!-- Login Form -->
            <form id="loginForm">
                <div class="form-group">
                    <label>EMAIL</label>
                    <input type="email" id="email" placeholder="admin@email.com" required>
                </div>
                <div class="form-group">
                    <label>MẬT KHẨU</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" id="loginBtn">
                    Đăng nhập
                </button>
            </form>

            <!-- Register Form (Hidden by default) -->
            <form id="registerForm" style="display: none;">
                <div class="form-group">
                    <label>EMAIL CHỦ QUÁN</label>
                    <input type="email" id="regEmail" placeholder="chuquan@email.com" required>
                </div>
                <div class="form-group">
                    <label>MẬT KHẨU</label>
                    <input type="password" id="regPassword" placeholder="Ít nhất 6 ký tự" required minlength="6">
                </div>
                <button type="submit" class="btn btn-primary" id="registerBtn"
                    style="background:#ff9f43; border-color:#ff9f43;">
                    Đăng ký tài khoản
                </button>
            </form>

            <div class="login-footer">
                <span id="toggleText">Chưa có tài khoản chủ quán?</span><br>
                <a href="#" id="toggleAuthMode">Đăng ký ngay</a>
            </div>
        </div>
    </div>

    <!-- Firebase SDK (compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
